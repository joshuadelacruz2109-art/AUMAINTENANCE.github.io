<!DOCTYPE html>
<html lang="en">
<head>

  <title>Maintenance Office Borrowing & Incident Report System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="left-panel">
    <img src="Arellano_University_logo.png" alt="University Logo" style="margin-left: 75px;">

  <script src="signup-login.js"></script>
