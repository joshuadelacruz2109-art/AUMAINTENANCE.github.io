<!DOCTYPE html>
<html lang="en">
<script type="module">
  import { firebaseConfig } from './firebase-config.js';
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
  import { getFirestore } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";
  import { getAuth } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
  
  // Initialize Firebase
  window.firebaseApp = initializeApp(firebaseConfig);
  window.db = getFirestore(window.firebaseApp);
  window.auth = getAuth(window.firebaseApp);
</script>

<head>
<meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maintenance Office Sign Up</title>
  <link rel="stylesheet" href="signup.css">
</head>
<body>
  <div class="signup-panel">
    <div class="signup-box">
      <h1 class="title-text">Arellano University</h1>
      <img src="Arellano_University_logo.png" alt="University Logo" class="logo">
      <h2>Create Account</h2>
      
      <!-- Removed action attribute -->
      <form>
        <input type="text" placeholder="Full Name" required>
        <input type="email" placeholder="Email" required>
        <input type="password" placeholder="Password" required>
        <input type="password" placeholder="Confirm Password" required>
        <label>
          <input type="checkbox" required> I agree to the Terms & Conditions
        </label>
        <button type="submit">Sign Up</button>
        <a href="index.html">Already have an account? Login</a>
      </form>
    </div>
  </div>

  <!-- Link your JS file -->
  <script src="signup-login.js"></script>
</body>
</html>
