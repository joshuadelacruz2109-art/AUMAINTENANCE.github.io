<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Borrowed Items - Maintenance Office</title>
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>
  <header class="dashboard-header">
    <img src="Arellano_University_logo.png" alt="University Logo" class="logo">
    <div class="header-text">
      <h1>ARELLANO UNIVERSITY<br>ELISA ESGUERRA CAMPUS</h1>
      <p>Borrowed Items Report</p>
    </div>
  </header>

  <div class="dashboard-container">
    <aside class="sidebar">
      
      <button onclick="location.href='admin-dashboard.html'">Admin Dashboard</button>
      <button onclick="location.href='index.html'">Sign Out</button>
    </aside>

    <main class="main-content">
      <h2>Borrowed Items</h2>
      <p>Total Borrowed: <span id="borrowedCount">0</span></p>
      
      <div class="items-grid">
        <ul id="borrowedItemsList">
          <li>No borrowed items yet.</li>
        </ul>
      </div>
      
      <button onclick="printReport()">🖨️ Print Report</button>
    </main>
  </div>

  <script src="borrowing-system.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Show borrowed items prominently
      const borrowedItems = JSON.parse(localStorage.getItem('borrowedItems') || '[]');
      const list = document.getElementById('borrowedItemsList');
      const count = document.getElementById('borrowedCount');
      
      count.textContent = borrowedItems.length;
      
      if (borrowedItems.length === 0) {
        list.innerHTML = '<li>No borrowed items.</li>';
      } else {
        list.innerHTML = borrowedItems.map(record => `
          <li class="borrowed-item">
            <strong>${record.item}</strong><br>
            Borrowed by: <strong>${record.borrower}</strong><br>
            Date: <em>${record.date}</em>
          </li>
        `).join('');
      }
    });

    function printReport() {
      window.print();
    }
  </script>

  <style>
    .items-grid { max-width: 800px; margin: 20px 0; }
    .borrowed-item { 
      background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
      padding: 20px; 
      margin: 10px 0; 
      border-radius: 12px; 
      border-left: 5px solid #007bff; 
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }
    @media print {
      .sidebar, button { display: none; }
      .borrowed-item { break-inside: avoid; }
    }
  </style>
</body>
</html>
